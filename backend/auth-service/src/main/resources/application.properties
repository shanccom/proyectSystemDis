server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:auth_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:auth_pass}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:base64secretforjwtsigningkey12345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=auth-service
