server.port=${SERVER_PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/admin_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin_pass}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:voting}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:voting_pass}

minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minio_admin}
minio.secret-key=${MINIO_SECRET_KEY:minio_secret}
minio.bucket=${MINIO_BUCKET:voting-acts}

management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=admin-service
